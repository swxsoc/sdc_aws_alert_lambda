version: 0.2

env:
  variables:
    ECR_REGION: us-east-1

phases:
  pre_build:
    commands:
      - set -euo pipefail
      - echo Installing CI/CD Dependencies...
      - python -m pip install --upgrade pip
      - pip3 install flake8 black pytest pytest-astropy pytest-cov
      - pip3 install -r requirements.txt
      - echo ________________________________

      # - echo Linting with Black...
      # - black --check --diff lambda_function
      # - echo ________________________________
      
      # - echo Linting with Flake...
      # - flake8 --count --max-line-length 88 lambda_function --exclude lambda_function_test_script.py
      # - echo ________________________________
    
  build:
    commands:
      - set -euo pipefail
      - REGION=$ECR_REGION
      - ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
      - |
        echo Login to Private ECR $REGION
        ECR_PASSWORD=$(aws ecr get-login-password --region "$REGION")
        printf '%s\n' "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
      - echo ________________________________

      - echo Resolve target image and base image
      - |
        BASE_IMAGE="public.ecr.aws/w5r9l1c8/swsoc-docker-lambda-base:latest"
        ECR_REPO_NAME="swxsoc_sdc_aws_alert_lambda"
        ENVIRONMENT="${CDK_ENVIRONMENT:-PRODUCTION}"
        if git describe --tags --exact-match > /dev/null 2>&1; then
          echo "This is a tag push event"
          VERSION=$(git describe --tags --exact-match)
        elif [ "$ENVIRONMENT" = "DEVELOPMENT" ] || [ "$ENVIRONMENT" = "DEV" ]; then
          echo "This is a development environment"
          BASE_IMAGE="public.ecr.aws/w5r9l1c8/dev-swsoc-docker-lambda-base:latest"
          VERSION=$(date -u +"%Y%m%d%H%M%S")
        else
          echo "This is a production environment"
          VERSION=$(date -u +"%Y%m%d%H%M%S")
        fi
        ECR_REPO="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO_NAME"
        if ! aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" --region "$REGION" > /dev/null; then
          echo "ECR repository '$ECR_REPO_NAME' does not exist in account '$ACCOUNT_ID' region '$REGION'."
          echo "Create that repository before rerunning this build."
          exit 1
        fi
      - echo ________________________________

      - echo Build Docker Image
      - docker build --build-arg BASE_IMAGE=$BASE_IMAGE -t $ECR_REPO:latest lambda_function/.

      - echo Tagging Docker Image...
      - docker tag $ECR_REPO:latest $ECR_REPO:$VERSION

      - echo Pushing the Docker image with Tags...
      - docker push $ECR_REPO:latest
      - docker push $ECR_REPO:$VERSION
      - echo ________________________________

      - echo Alert Lambda image published as a standalone ancillary asset with tag $VERSION.
      - echo ________________________________

  post_build:
    commands:
      - |
        set -euo pipefail
        if [ "${CODEBUILD_BUILD_SUCCEEDING:-0}" = "1" ]; then
          echo Build Successful - Lambda Successfully Built and Pushed to ECR
        else
          echo Build Failed - Lambda image was not built or pushed to ECR
        fi
